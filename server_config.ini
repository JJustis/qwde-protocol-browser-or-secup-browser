# QWDE Protocol - Server Configuration
# Configure central server and database locations
# Using secupgrade.com base domain

[central_server]
# Central DDNS API Server Location
# This is the PHP backend that handles all API requests
protocol = https
host = secupgrade.com
port = 443
api_path = /qwde_ddns_api.php
full_url = https://secupgrade.com/qwde_ddns_api.php

# Alternative HTTP (for testing only)
# protocol = http
# port = 80

[central_database]
# MySQL Database Server Location
# This is where site data is permanently stored
host = secupgrade.com
port = 3306
database_name = qwde_ddns
username = qwde_user
password = CHANGE_THIS_PASSWORD
use_ssl = True
ssl_ca_path = 

[peer_network]
# P2P Network Settings
local_bind_host = 0.0.0.0
local_bind_port = 8766
max_peer_connections = 8
discovery_interval_seconds = 120
heartbeat_interval_seconds = 60

[security]
# Security Settings - HTTPS BY DEFAULT
https_only_mode = True
verify_ssl_certificates = True
verify_peer_certificates = True
ca_bundle_path = 
min_tls_version = 1.2

[api]
# API Communication Settings
request_timeout_seconds = 30
max_retry_attempts = 3
retry_delay_seconds = 5
polling_interval_seconds = 30
enable_compression = True

[logging]
# Logging Configuration
log_level = INFO
log_to_file = True
log_file_path = qwde.log
max_log_size_mb = 10
log_rotation = True
