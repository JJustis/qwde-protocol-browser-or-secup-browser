# ═══════════════════════════════════════════════════════════
# QWDE PROTOCOL - CLIENT CONFIGURATION
# ═══════════════════════════════════════════════════════════
# This file is for CLIENT SIDE only (QWDE_Browser.exe)
# DO NOT upload this file to secupgrade.com!
# Server uses api_handler.php with embedded config.

[protocol]
# Custom Protocol Configuration
# Change the protocol prefix to anything you want
protocol_prefix = qwde
protocol_separator = ://
# Full protocol will be: qwede://

# Examples:
# protocol_prefix = qwde      → qwede://
# protocol_prefix = this      → this://
# protocol_prefix = mysite    → mysite://
# protocol_prefix = secure    → secure://

[mysql]
# MySQL Database Configuration
# ONLY USED IF RUNNING LOCAL CENTRAL SERVER
# Not used when connecting to secupgrade.com
host = localhost
port = 3306
user = qwde_user
password = qwde_secure_password_here
database = qwde_ddns

[server]
# Local DDNS Server Configuration
# ONLY FOR RUNNING YOUR OWN CENTRAL SERVER
host = 0.0.0.0
port = 8765
use_sqlite = False

[central_server]
# Central DDNS API Endpoint (secupgrade.com)
# This is what the browser connects to
protocol = https
host = secupgrade.com
port = 443
api_path = /api_handler.php
url = https://secupgrade.com/api_handler.php

# For local testing (if running your own server)
# protocol = http
# host = localhost
# port = 8080
# url = http://localhost:8080/api_handler.php

[peer]
# Peer Network Configuration
default_port = 8766
max_connections = 8
discovery_interval = 120
heartbeat_interval = 60

[encryption]
# Encryption Settings
rsa_key_size = 2048
session_timeout = 3600
key_rotation_interval = 300

[security]
# Security Settings - HTTPS BY DEFAULT
https_only = True
verify_certificates = True
verify_ssl_certs = True
ca_bundle_path = 

[api]
# API Configuration
base_url = https://secupgrade.com/api_handler.php
timeout = 30
retry_attempts = 3
retry_delay = 5
