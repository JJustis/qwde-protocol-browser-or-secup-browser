[protocol]
# Custom Protocol Configuration
# Change the protocol prefix to anything you want
protocol_prefix = qwde
protocol_separator = ://
# Full protocol will be: qwde://

# Examples:
# protocol_prefix = qwde      → qwde://
# protocol_prefix = this      → this://
# protocol_prefix = mysite    → mysite://
# protocol_prefix = secure    → secure://

[mysql]
# MySQL Database Configuration for Central DDNS Server
# Using secupgrade.com base domain (no subdomain)
host = secupgrade.com
port = 3306
user = qwde_user
password = qwde_secure_password_here
database = qwde_ddns

[server]
# DDNS Server Configuration
host = 0.0.0.0
port = 8765
use_sqlite = False

[central_server]
# Central DDNS Server Address - Using secupgrade.com base domain
# NO SUBDOMAIN - uses base domain directly
protocol = https
host = secupgrade.com
port = 443
api_path = /qwde_ddns_api.php
url = https://secupgrade.com/qwde_ddns_api.php

# Localhost for testing (HTTP)
# protocol = http
# host = localhost
# port = 8080
# url = http://localhost:8080/qwde_ddns_api.php

[peer]
# Peer Network Configuration
default_port = 8766
max_connections = 8
discovery_interval = 120
heartbeat_interval = 60

[encryption]
# Encryption Settings
rsa_key_size = 2048
session_timeout = 3600
key_rotation_interval = 300

[security]
# Security Settings - HTTPS BY DEFAULT
https_only = True
verify_certificates = True
verify_ssl_certs = True
ca_bundle_path = 

[api]
# API Configuration
base_url = https://secupgrade.com/qwde_ddns_api.php
timeout = 30
retry_attempts = 3
retry_delay = 5
